services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: arena
      POSTGRES_PASSWORD: arena
      POSTGRES_DB: arena
    ports:
      - '5432:5432'
    volumes:
      - arena_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U arena']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    image: arena-server
    ports:
      - '2567:2567'
    environment:
      - NODE_ENV=production
      - PORT=2567
      - HOST=0.0.0.0
      # Player persistence. `postgres` is the compose service hostname.
      - DATABASE_URL=postgres://arena:arena@postgres:5432/arena
      - PGSSL=disable
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:2567/health']
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  client:
    build:
      context: .
      dockerfile: apps/client/Dockerfile
      args:
        # Point the browser bundle at the public server endpoint.
        VITE_SERVER_URL: ws://localhost:2567
    image: arena-client
    ports:
      - '8080:80'
    depends_on:
      - server
    restart: unless-stopped

volumes:
  arena_pgdata:
