services:
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    image: arena-server
    ports:
      - '2567:2567'
    environment:
      - NODE_ENV=production
      - PORT=2567
      - HOST=0.0.0.0
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:2567/health']
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  client:
    build:
      context: .
      dockerfile: apps/client/Dockerfile
      args:
        # Point the browser bundle at the public server endpoint.
        VITE_SERVER_URL: ws://localhost:2567
    image: arena-client
    ports:
      - '8080:80'
    depends_on:
      - server
    restart: unless-stopped
